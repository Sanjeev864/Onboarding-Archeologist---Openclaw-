services:
  backend:
    image: onboarding-archaeologist-backend:latest
    environment:
      ENVIRONMENT: production
      LOG_LEVEL: INFO
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LLM_MODEL: ${LLM_MODEL:-llama3:latest}
      OLLAMA_API_URL: ${OLLAMA_API_URL:-http://ollama:11434}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-3-haiku-20240307}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      DATABASE_URL: sqlite:///./data/archaeologist.db
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: onboarding-archaeologist-frontend:latest
    ports:
      - "3000:80"
