apiVersion: apps/v1
kind: Deployment
metadata:
  name: onboarding-archaeologist
spec:
  replicas: 2
  selector:
    matchLabels:
      app: onboarding-archaeologist
  template:
    metadata:
      labels:
        app: onboarding-archaeologist
    spec:
      containers:
        - name: backend
          image: onboarding-archaeologist-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: ENVIRONMENT
              value: production
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 1Gi
              cpu: 500m
