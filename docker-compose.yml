services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: archaeologist-backend
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: archaeologist-frontend
    env_file: .env
    ports:
      - "3000:80"
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    container_name: archaeologist-redis

  ollama:
    image: ollama/ollama:latest
    container_name: archaeologist-ollama
    profiles:
      - llm
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama

volumes:
  ollama:
